name: Verify Reader Bundle

on:
  push:
    branches:
      - main
  schedule:
    - cron: '23 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-reader-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify reader bundle guard
        run: npm run verify:bundle
