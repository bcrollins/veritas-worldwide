name: Verify Analytics Snapshot

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify live analytics snapshot
        run: npm run verify:analytics -- https://veritasworldwide.com

      - name: Upload analytics verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-health-report
          path: |
            .claude-state/analytics-health-report.json
            .claude-state/analytics-health-report.md
