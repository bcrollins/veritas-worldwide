name: Verify Platform Health

on:
  push:
    branches:
      - main
  schedule:
    - cron: '11 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-platform-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLATFORM_VERIFY_TIMEOUT_MS: '20000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify live platform health
        run: npm run verify:platform -- https://veritasworldwide.com

      - name: Upload platform health reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-health-report
          path: |
            .claude-state/platform-health-report.json
            .claude-state/platform-health-report.md
