<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#2A2020"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top crimson accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#8B1A1A"/>
  <!-- Publisher label -->
  <text x="600" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" letter-spacing="6" fill="rgba(255,255,255,0.4)" text-transform="uppercase">VERITAS WORLDWIDE PRESS</text>
  <!-- Main title -->
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FFFFFF">The Record</text>
  <!-- Crimson rule -->
  <line x1="440" y1="290" x2="760" y2="290" stroke="#8B1A1A" stroke-width="2"/>
  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-style="italic" fill="rgba(255,255,255,0.6)">A Documentary History of Power, Money, and the</text>
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-style="italic" fill="rgba(255,255,255,0.6)">Institutions That Shaped the Modern World</text>
  <!-- Stats -->
  <text x="300" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#A52A2A">31</text>
  <text x="300" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.35)">CHAPTERS</text>
  <text x="500" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#A52A2A">500+</text>
  <text x="500" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.35)">SOURCES</text>
  <text x="700" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#A52A2A">240+</text>
  <text x="700" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.35)">YEARS</text>
  <text x="900" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#A52A2A">100%</text>
  <text x="900" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.35)">FREE</text>
  <!-- Tagline -->
  <text x="600" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="4" fill="#8B1A1A">PRIMARY SOURCES · PUBLIC RECORD · YOUR CONCLUSIONS</text>
  <!-- URL -->
  <text x="600" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">veritasworldwide.com</text>
  <!-- Bottom crimson accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="#8B1A1A"/>
</svg>
